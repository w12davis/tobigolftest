            <label class="muted" style="display: block; margin-bottom: 6px; font-weight: 500;">Course name</label>
            <input class="input" id="tg-cd-name" placeholder="e.g. Royal St George's" value="${esc(courseName)}" style="margin-bottom: 12px;" />

            <label class="muted" style="display: block; margin-bottom: 6px; font-weight: 500;">Course rating</label>
            <input class="num" type="number" step="0.1" id="tg-cd-cr" placeholder="e.g. 72.4" value="${courseRating}" style="margin-bottom: 12px;" />

            <input class="num" type="number" id="tg-cd-sr" placeholder="e.g. 113" value="${slopeRating}" style="margin-bottom: 18px;" />

            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 8px;">
              <button class="btn-2" data-a="closeM">Cancel</button>
              <button class="btn" data-a="saveCourseData">Save</button>
            </div>
          </div>
        </div>
      `;

    return '';
  }

  function updateStartButton() {
    const btn = document.querySelector('[data-a="start"]');
    if (!btn) return;
    const o = s.setup;
    const holesValid = !o.holesError && o.holes >= 1 && o.holes <= 18;
    const playersValid = o.players.length >= 1 && o.players.length <= 4 && o.players.every(p => p.name && p.name.trim());
    const specialsValid = o.specials.every(sp => sp.hole >= 1 && sp.hole <= o.holes && sp.mult >= 2);
    const isSoloSetup = o.players.length === 1;
    const modeValid = isSoloSetup || o.mode === 'tobigolf' || o.mode === 'standard';
    btn.disabled = !(holesValid && playersValid && specialsValid && modeValid);
  }

  function bind() {
    document.querySelectorAll('[data-a]').forEach(el => el.addEventListener('click', handle));
    document.querySelectorAll('[data-pn]').forEach(el => el.addEventListener('input', e => {
      s.setup.players[+e.target.dataset.pn].name = e.target.value; saveS(); updateStartButton();
    }));
    document.querySelectorAll('[data-ps]').forEach(el => el.addEventListener('change', e => {
      s.setup.players[+e.target.dataset.ps].shots = +e.target.value; saveS();
    }));
    document.querySelectorAll('[data-sh]').forEach(el => el.addEventListener('input', e => {
      s.setup.specials[+e.target.dataset.sh].hole = +e.target.value; saveS(); updateStartButton();
    }));
    document.querySelectorAll('[data-sm]').forEach(el => el.addEventListener('input', e => {
      const raw = e.target.value;
      const v = raw === '' ? 0 : +raw;
      s.setup.specials[+e.target.dataset.sm].mult = v;
      saveS(); updateStartButton();
    }));
    const nameI = document.getElementById('tg-name');
    if (nameI) nameI.addEventListener('input', e => { s.setup.name = e.target.value; saveS(); });
    const courseI = document.getElementById('tg-course');
    if (courseI) courseI.addEventListener('input', e => { s.setup.courseName = e.target.value; saveS(); });
    const modeI = document.getElementById('tg-mode');
    if (modeI) modeI.addEventListener('change', e => {
      const v = e.target.value;
      s.setup.mode = v || null;
      // Clear specials if switching to standard
      if (s.setup.mode === 'standard') s.setup.specials = [];
      saveS();
      render();
    });
    const holesI = document.getElementById('tg-holes');
    if (holesI) holesI.addEventListener('input', e => {
      const v = +e.target.value;
      const raw = e.target.value;
      const el = e.target;
      const card = el.closest('.card');
      const existingErr = card?.querySelector('.input-error-msg');

      let errMsg = null;
      if (raw === '') errMsg = null; // empty is OK while typing, just don't save
      else if (isNaN(v) || v < 1) errMsg = 'Min 1 hole';
      else if (v > 18) errMsg = 'Max 18 holes';

      if (errMsg) {
        el.classList.add('error');
        s.setup.holes = v;
        s.setup.holesError = errMsg;
        if (existingErr) existingErr.textContent = errMsg;
        else {
          const div = document.createElement('div');
          div.className = 'input-error-msg';
          div.textContent = errMsg;
          el.parentNode.appendChild(div);
        }
      } else {
        el.classList.remove('error');
        if (existingErr) existingErr.remove();
        s.setup.holes = v || 1;
        s.setup.holesError = null;
      }
      saveS();
      updateStartButton();
    });

    document.querySelectorAll('[data-si]').forEach(el => el.addEventListener('input', e => {
      const i = +e.target.dataset.si; const r = s.round; const h = r.currentHole;
      if (!r.scores[h]) r.scores[h] = r.players.map(() => null);
      const v = e.target.value;
      r.scores[h][i] = v === '' ? null : Number(v);
      if (r.pickups?.[h]?.[i]) r.pickups[h][i] = false;
      saveS(); render();
    }));

    const par = document.getElementById('tg-par');
    if (par) par.addEventListener('input', e => {
      const r = s.round; if (!r.pars) r.pars = {};
      if (!r.parError) r.parError = {};
      const h = r.currentHole;
      const v = e.target.value;
      const el = e.target;
      const wrapper = el.parentNode;
      const existingErr = wrapper?.querySelector('.input-error-msg');

      let errMsg = null;
      if (v === '') {
        errMsg = null;
      } else {
        const n = Number(v);
        if (isNaN(n)) errMsg = 'Must be a number';
        else if (n < 3) errMsg = 'Min par 3';
        else if (n > 5) errMsg = 'Max par 5';
      }

      if (errMsg) {
        el.classList.add('error');
        r.parError[h] = errMsg;
        if (existingErr) existingErr.textContent = errMsg;
        else {
          const div = document.createElement('div');
          div.className = 'input-error-msg';
          div.textContent = errMsg;
          wrapper.appendChild(div);
        }
        // Don't save par value when invalid
        r.pars[h] = null;
        saveS();
        // Don't re-render — keep focus while typing
      } else {
        el.classList.remove('error');
        if (existingErr) existingErr.remove();
        delete r.parError[h];
        r.pars[h] = v === '' ? null : Number(v);
        // Recompute pickup scores for this hole
        if (r.pickups?.[h] && isFilled(r.pars[h])) {
          Object.keys(r.pickups[h]).forEach(pi => {
            if (r.pickups[h][pi]) {
              if (!r.scores[h]) r.scores[h] = r.players.map(() => null);
              r.scores[h][pi] = Number(r.pars[h]) + 4;
            }
          });
        }
        saveS();
        render();
      }
    });

    document.querySelectorAll('[data-stop-bg]').forEach(el => el.addEventListener('click', e => e.stopPropagation()));
  }

  function handle(e) {
    const a = e.currentTarget.dataset.a;
    const i = e.currentTarget.dataset.i;
    const r = s.round;
    if (a === 'delH') e.stopPropagation();

    switch (a) {
      case 'home': s.view = 'home'; s.summaryRound = null; break;
      case 'new': {
        // If there's an active round, warn before discarding it
        if (s.round) {
          s.modal = { type: 'confirm', title: 'Start a new round?', body: "You've got a round in progress. Starting a new one will discard the current round — it won't be saved.", confirmLabel: 'Start new round', danger: true, action: 'newConfirmed' };
          break;
        }
        const t = loadT();
        const p1Name = t.name || '';
        s.view = 'setup';
        s.setup = { name: '', courseName: '', holes: 18, players: [{ name: p1Name, shots: 0 }], specials: [], mode: null };
        break;
      }
      case 'resume': s.view = 'play'; break;
      case 'history': s.view = 'history'; s.summaryRound = null; break;
      case 'rules': s.view = 'rules'; break;
      case 'handicap': s.view = 'handicap'; break;
      case 'handicapHowto': s.view = 'handicapHowto'; break;
      case 'setTrackerName': s.modal = { type: 'trackerName' }; break;
      case 'saveTrackerName': {
        const newName = document.getElementById('tg-tracker-name').value.trim();
        const t = loadT();
        const wasFirstTime = !t.name || !t.name.trim();
        t.name = newName;
        saveT(t);
        if (wasFirstTime && newName) {
          // Chain into estimate prompt for first-time users
          s.modal = { type: 'estimate', hasExistingEstimate: false };
        } else {
          s.modal = null;
        }
        break;
      }
      case 'setEstimate': {
        const t = loadT();
        s.modal = { type: 'estimate', hasExistingEstimate: t.estimatedHandicap !== undefined && t.estimatedHandicap !== null && t.estimatedHandicap !== '' };
        break;
      }
      case 'saveEstimate': {
        const raw = document.getElementById('tg-est').value;
        const t = loadT();
        if (raw === '') {
          // User skipped/cleared
          delete t.estimatedHandicap;
          saveT(t);
          s.modal = null;
          break;
        }
        const v = Number(raw);
        if (isNaN(v) || v < 0 || v > 54) {
          s.modal.error = 'Enter a number between 0 and 54.';
          break;
        }
        t.estimatedHandicap = v;
        saveT(t);
        s.modal = null;
        break;
      }
      case 'editCourseData': {
        const ts = +e.currentTarget.dataset.ts;
        s.modal = { type: 'courseData', ts };
        break;
      }
      case 'saveCourseData': {
        const ts = s.modal.ts;
        const cName = document.getElementById('tg-cd-name').value.trim();
        const crRaw = document.getElementById('tg-cd-cr').value;
        const srRaw = document.getElementById('tg-cd-sr').value;
        const cr = crRaw === '' ? null : Number(crRaw);
        const sr = srRaw === '' ? null : Number(srRaw);
        // Validate
        if (cr === null || sr === null || isNaN(cr) || isNaN(sr)) {
          s.modal.error = 'Course rating and slope are required.';
          break;
        }
        if (cr < 60 || cr > 80) {
          s.modal.error = 'Course rating should be between 60 and 80.';
          break;
        }
        if (sr < 55 || sr > 155) {
          s.modal.error = 'Slope rating should be between 55 and 155.';
          break;
        }
        const t = loadT();
        if (!t.courseData) t.courseData = {};
        t.courseData[ts] = { courseName: cName, courseRating: cr, slopeRating: sr };
        saveT(t);
        s.modal = null;
        break;
      }
      case 'addP': if (s.setup.players.length < 4) s.setup.players.push({ name: '', shots: 0 }); break;
      case 'rmP': s.setup.players.splice(+i, 1); if (s.setup.players.length === 1) s.setup.specials = []; break;
      case 'addS': s.setup.specials.push({ hole: 1, mult: 2 }); break;
      case 'rmS': s.setup.specials.splice(+i, 1); break;
      case 'start':
        if (s.setup.holesError || s.setup.holes < 1 || s.setup.holes > 18) { alert('Holes must be between 1 and 18'); return; }
        if (s.setup.players.length < 1) { alert('Need at least 1 player'); return; }
        if (s.setup.players.length > 4) { alert('Max 4 players'); return; }
        if (s.setup.players.some(p => !p.name.trim())) { alert('All players need a name'); return; }
        s.round = {
          name: s.setup.name.trim(),
          courseName: (s.setup.courseName || '').trim(),
          mode: s.setup.players.length === 1 ? 'tobigolf' : s.setup.mode,
          players: s.setup.players.map(p => ({ name: p.name.trim(), shots: p.shots || 0 })),
          holes: s.setup.holes,
          specials: s.setup.specials.filter(sp => sp.hole >= 1 && sp.hole <= s.setup.holes && sp.mult >= 2),
          scores: {}, pars: {}, pickups: {}, skipped: {},
          leftAfter: {}, transferReceived: {}, transfers: [],
          currentHole: 1, tab: 'score',
          startedAt: Date.now()
        };
        s.view = 'play'; break;
      case 'tab': r.tab = e.currentTarget.dataset.t; break;
      case 'goto': r.currentHole = +e.currentTarget.dataset.h; break;
      case 'prev': if (r.currentHole > 1) r.currentHole--; break;
      case 'next': {
        if (!isHoleComplete(r, r.currentHole)) return;
        if (r.currentHole < r.holes) {
          r.currentHole++;
        } else {
          s.modal = { type: 'confirm', title: 'Finish round?', body: 'All holes complete. Show summary?', confirmLabel: 'Show summary', action: 'finishConfirmed' };
        }
        break;
      }
      case 'pickup': {
        const pi = +i; const h = r.currentHole;
        const par = r.pars?.[h];
        if (!isFilled(par)) return;
        if (!r.pickups[h]) r.pickups[h] = {};
        if (!r.scores[h]) r.scores[h] = r.players.map(() => null);
        const cur = r.pickups[h][pi];
        if (cur) {
          r.pickups[h][pi] = false;
          r.scores[h][pi] = null;
        } else {
          r.pickups[h][pi] = true;
          r.scores[h][pi] = Number(par) + 4;
        }
        break;
      }
      case 'skip': {
        const h = r.currentHole;
        // Only allowed before any data entered
        if (isHoleStarted(r, h)) return;
        if (!r.skipped) r.skipped = {};
        r.skipped[h] = true;
        break;
      }
      case 'unskip': {
        const h = r.currentHole;
        if (!r.skipped) r.skipped = {};
        r.skipped[h] = false;
        delete r.skipped[h];
        break;
      }
      case 'addHole': {
        if (r.holes < 18) r.holes++;
        break;
      }
      case 'distance': {
        s.distOpen = true;
        break;
      }
      case 'closeDist': {
        s.distOpen = false;
        if (window._distMap) {
          try { window._distMap.remove(); } catch(e) {}
          window._distMap = null;
        }
        if (window._distWatchId) {
          try { navigator.geolocation.clearWatch(window._distWatchId); } catch(e) {}
          window._distWatchId = null;
        }
        break;
      }
      case 'recenter': {
        if (window._distMap && window._distUserLatLng) {
          window._distMap.setView(window._distUserLatLng, window._distMap.getZoom());
        }
        break;
      }
      case 'tobi': s.modal = { type: 'tobi' }; break;
      case 'closeM': s.modal = null; break;
      case 'confirmTobi': {
        const leaver = +document.getElementById('tg-leaver').value;
        const recipient = +document.getElementById('tg-recipient').value;
        if (leaver === recipient) {
          s.modal.error = "Pick a different player to receive the points.";
          s.modal.selectedLeaver = leaver;
          break;
        }

        // Player has already left — current hole is the FIRST hole they don't play
        const leaveHole = Math.max(0, r.currentHole - 1);

        // Compute leaver's points up to leaveHole (this is what transfers)
        let leaverPts = r.transferReceived?.[leaver] || 0;
        for (let h = 1; h <= leaveHole; h++) {
          const hp = calcHolePoints(r, h);
          if (hp[leaver] !== null) leaverPts += hp[leaver];
        }

        if (!r.transferReceived) r.transferReceived = {};
        r.transferReceived[recipient] = (r.transferReceived[recipient] || 0) + leaverPts;
        r.leftAfter[leaver] = leaveHole;
        if (!r.transfers) r.transfers = [];
        r.transfers.push({ atHole: r.currentHole, fromIdx: leaver, toIdx: recipient, points: leaverPts });
        s.modal = null;
        break;
      }
      case 'finish': {
        // Finish only allowed before hole has been started — and always requires confirmation
        // because tapping this means user is skipping the current hole (and any after)
        if (isHoleStarted(r, r.currentHole)) return;
        const scoredCount = r.currentHole - 1;
        const msg = scoredCount === 0
          ? `No holes have been scored yet. Are you sure you want to finish?`
          : `${scoredCount} of ${r.holes} ${scoredCount === 1 ? 'hole' : 'holes'} scored. Remaining ${r.holes - scoredCount === 1 ? 'hole won\'t' : 'holes won\'t'} count. Are you sure?`;
        s.modal = { type: 'confirm', title: 'Finish round early?', body: msg, confirmLabel: 'Finish', action: 'finishConfirmed' };
        break;
      }
      case 'saveSummary': {
        const h = loadH();
        h.unshift({ ...r, savedAt: Date.now() });
        saveH(h);
        s.round = null;
        s.summaryRound = null;
        s.view = 'home';
        break;
      }
      case 'discardSummary':
        s.modal = { type: 'confirm', title: 'Discard round?', body: 'This will delete the round without saving.', confirmLabel: 'Discard', danger: true, action: 'discard' };
        break;
      case 'abandon':
        s.modal = { type: 'confirm', title: 'Abandon round?', body: 'This will delete the current round without saving.', confirmLabel: 'Abandon', danger: true, action: 'abandon' };
        break;
      case 'confirmM': {
        const action = s.modal.action;
        const data = s.modal;
        s.modal = null;
        if (action === 'abandon' || action === 'discard') {
          s.round = null; s.summaryRound = null; s.view = 'home';
        } else if (action === 'delHistory') {
          const h = loadH(); h.splice(data.idx, 1); saveH(h);
        } else if (action === 'finishConfirmed') {
          s.summaryRound = r;
          s.view = 'summary';
        } else if (action === 'newConfirmed') {
          // Discard active round and go to setup
          s.round = null;
          s.summaryRound = null;
          const t = loadT();
          const p1Name = t.name || '';
          s.view = 'setup';
          s.setup = { name: '', courseName: '', holes: 18, players: [{ name: p1Name, shots: 0 }], specials: [], mode: null };
        }
        break;
      }
      case 'openH': {
        const h = loadH(); s.summaryRound = h[+i]; s.view = 'summary';
        break;
      }
      case 'delH': {
        s.modal = { type: 'confirm', title: 'Delete round?', body: 'This permanently deletes the saved round.', confirmLabel: 'Delete', danger: true, action: 'delHistory', idx: +i };
        break;
      }
    }
    saveS(); render();
  }

  load(); render();
})();
</script>
</body>
</html>
